version: '3.9'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-react-webhook
    ports:
      - '5678:5678'
    volumes:
      - ./n8n-data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - GENERIC_TIMEZONE=UTC
